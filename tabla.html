<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabla de Posiciones</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 12px;
  text-align: center;
}

th {
  background: rgba(255,255,255,0.1);
}

tr:nth-child(even) {
  background: rgba(255,255,255,0.03);
}

tr:hover {
  background: rgba(255,255,255,0.1);
}
</style>

</head>

<body>

<h1>🏆 Tabla de Posiciones</h1>

<!-- PEGA TU TABLA DE EXCEL AQUÍ -->
<table>
  <tr>
    <th>Pos</th>
    <th>Jugador</th>
    <th>Puntos</th>
  </tr>

  <tr>
    <td>1</td>
    <td>Juan</td>
    <td>25</td>
  </tr>

</table>

</body>
</html>
