<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polla Mundialista 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: url('fondo.jpg') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

/* Overlay */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.9));
}

/* Partículas */
#particles {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  text-align: center;
  width: 90%;
  max-width: 400px;
}

/* Trofeo */
.logo {
  width: 80px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-12px); }
  100% { transform: translateY(0px); }
}

h1 {
  font-size: 34px;
  font-weight: 700;
}

.subtitle {
  font-size: 14px;
  opacity: 0.8;
  margin: 10px 0 30px;
}

/* Glass card */
.card {
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 15px;
}

/* Botones */
.btn {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px;
  margin: 10px 0;
  border-radius: 15px;
  background: rgba(255,255,255,0.15);
  text-decoration: none;
  color: white;
  font-weight: 500;
  transition: 0.3s;
}

.btn:hover {
  background: rgba(255,255,255,0.25);
  transform: scale(1.05);
}

/* Redes */
.socials {
  margin-top: 25px;
  display: flex;
  justify-content: center;
  gap: 20px;
}

.social {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>
</head>

<body>

<div id="particles"></div>

<div class="container">

  <img src="trofeo.png" class="logo">

  <h1>POLLA<br>MUNDIALISTA 2026</h1>

  <p class="subtitle">
    Predice resultados y compite por el primer lugar 🏆
  </p>

  <div class="card">
    <a href="tabla.html" class="btn">
      <span>📊 TABLA DE POSICIONES</span>
    </a>

    <a href="marcadores.html" class="btn">
      <span>📈 MARCADORES</span>
    </a>

    <a href="simulador.html" class="btn">
      <span>💰 SIMULADOR</span>
    </a>
  </div>

  <div class="socials">
    <div class="social">💬</div>
    <div class="social">🎵</div>
  </div>

</div>

<!-- Partículas -->
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
<script>
tsParticles.load("particles", {
  particles: {
    number: { value: 35 },
    color: { value: "#ffffff" },
    opacity: { value: 0.3 },
    size: { value: 2 },
    move: { enable: true, speed: 0.8 }
  }
});
</script>

</body>
</html>
