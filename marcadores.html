<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcadores Mundial 2026</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  padding: 20px;
}

h1 {
  text-align: center;
}

.grupo {
  margin: 25px 0;
}

.grupo h2 {
  color: #38bdf8;
}

.partido {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.05);
  padding: 10px;
  border-radius: 10px;
  margin: 6px 0;
}

.equipo {
  width: 35%;
  display: flex;
  align-items: center;
  gap: 6px;
}

input {
  width: 40px;
  text-align: center;
  border-radius: 5px;
  border: none;
}
</style>
</head>

<body>

<h1>⚽ Marcadores Mundial 2026</h1>

<script>
function crearGrupo(nombre, equipos, letra) {
  let html = `<div class="grupo"><h2>${nombre}</h2>`;
  
  let id = 1;

  for (let i = 0; i < equipos.length; i++) {
    for (let j = i + 1; j < equipos.length; j++) {
      html += `
      <div class="partido">
        <div class="equipo">${equipos[i]}</div>
        <input id="${letra}${id++}a">
        <span>-</span>
        <input id="${letra}${id++}b">
        <div class="equipo">${equipos[j]}</div>
      </div>`;
    }
  }

  html += `</div>`;
  document.write(html);
}

/* GRUPOS */
crearGrupo("Grupo A", ["🇲🇽 México","🇿🇦 Sudáfrica","🇰🇷 Corea","🇨🇿 Rep. Checa"], "a");
crearGrupo("Grupo B", ["🇨🇦 Canadá","🇶🇦 Qatar","🇨🇭 Suiza","🇧🇦 Bosnia"], "b");
crearGrupo("Grupo C", ["🇧🇷 Brasil","🇲🇦 Marruecos","🏴 Escocia","🇭🇹 Haití"], "c");
crearGrupo("Grupo D", ["🇺🇸 USA","🇵🇾 Paraguay","🇦🇺 Australia","🇹🇷 Turquía"], "d");
crearGrupo("Grupo E", ["🇩🇪 Alemania","🇪🇨 Ecuador","🇨🇮 Costa de Marfil","🇨🇼 Curazao"], "e");
crearGrupo("Grupo F", ["🇳🇱 Países Bajos","🇯🇵 Japón","🇹🇳 Túnez","🇸🇪 Suecia"], "f");
crearGrupo("Grupo G", ["🇧🇪 Bélgica","🇮🇷 Irán","🇪🇬 Egipto","🇳🇿 Nueva Zelanda"], "g");
crearGrupo("Grupo H", ["🇪🇸 España","🇺🇾 Uruguay","🇸🇦 Arabia","🇨🇻 Cabo Verde"], "h");
crearGrupo("Grupo I", ["🇫🇷 Francia","🇸🇳 Senegal","🇳🇴 Noruega","🇮🇶 Irak"], "i");
crearGrupo("Grupo J", ["🇦🇷 Argentina","🇩🇿 Argelia","🇦🇹 Austria","🇯🇴 Jordania"], "j");
crearGrupo("Grupo K", ["🇨🇴 Colombia","🇵🇹 Portugal","🇺🇿 Uzbekistán","🇨🇩 Congo"], "k");
crearGrupo("Grupo L", ["🏴 Inglaterra","🇭🇷 Croacia","🇬🇭 Ghana","🇵🇦 Panamá"], "l");

/* GUARDADO AUTOMÁTICO */
window.onload = () => {
  document.querySelectorAll("input").forEach(input => {
    input.value = localStorage.getItem(input.id) || "";

    input.addEventListener("input", () => {
      localStorage.setItem(input.id, input.value);
    });
  });
};
</script>

</body>
</html>
